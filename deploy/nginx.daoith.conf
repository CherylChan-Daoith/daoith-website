# Nginx config for www.daoith.com
# Install: sudo cp deploy/nginx.daoith.conf /etc/nginx/sites-available/daoith
#          sudo ln -sf /etc/nginx/sites-available/daoith /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name www.daoith.com daoith.com;

    # Certbot will add SSL block; redirect www after HTTPS enabled
    location /.well-known/acme-challenge/ {
        root /var/www/daoith-website;
    }

    location / {
        return 301 https://www.daoith.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.daoith.com;

    ssl_certificate     /etc/letsencrypt/live/www.daoith.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.daoith.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/daoith-website;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript text/html;

    # DeepSeek API proxy → Python backend
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name daoith.com;

    ssl_certificate     /etc/letsencrypt/live/www.daoith.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.daoith.com/privkey.pem;

    return 301 https://www.daoith.com$request_uri;
}
